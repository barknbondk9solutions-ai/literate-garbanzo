<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="stylesheet" href="style.min.css">
</head>
<body>

<h1>Our Expert Team of Dog Trainers</h1>
<p style= "text-align: center;">Dedicated to helping every dog and owner succeed.</p>

<div class="trainers" id="trainerContainer"></div>
      
<!-- Modal -->
<div class="modal" id="modal" aria-hidden="true">
  <div class="modal-content">
    <button class="close" id="modalClose">&times;</button>
    <h2 id="modalName"></h2>
    <div><strong>Title:</strong> <span id="modalTitle"></span></div>
    <div><strong>Credentials:</strong> <span id="modalCredentials"></span></div>
    <div class="badges" id="modalBadges"></div>
    <div><strong>Experience:</strong> <span id="modalExperience"></span></div>
    <div><strong>Specialties:</strong> <span id="modalSpecialties"></span></div>
    <p id="modalBio"></p>
    <div class="gallery" id="modalGallery"></div>
    <div class="no-photos" id="modalNoPhotos">No photos available</div>
  </div>
</div>

<script src="script.obf.js"></script>
</body>
</html>
